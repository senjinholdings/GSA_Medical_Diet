<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>JSON読み込みテスト</title>
</head>
<body>
    <h1>site-common-texts.json 読み込みテスト</h1>
    <div id="result"></div>
    
    <script>
        async function testJsonLoad() {
            const resultDiv = document.getElementById('result');
            
            try {
                // dataPath の確認
                const dataPath = './data/';
                resultDiv.innerHTML += `<p>dataPath: ${dataPath}</p>`;
                
                // JSON読み込み
                const response = await fetch(dataPath + 'site-common-texts.json');
                resultDiv.innerHTML += `<p>Response status: ${response.status}</p>`;
                resultDiv.innerHTML += `<p>Response ok: ${response.ok}</p>`;
                
                if (response.ok) {
                    const data = await response.json();
                    resultDiv.innerHTML += `<p style="color:green">✅ JSONを正常に読み込みました</p>`;
                    resultDiv.innerHTML += `<p>キー数: ${Object.keys(data).length}</p>`;
                    resultDiv.innerHTML += `<p>サイトロゴ: ${data['サイトロゴ']}</p>`;
                    resultDiv.innerHTML += `<p>MVSVGテキスト1: ${data['MVSVGテキスト1']}</p>`;
                    resultDiv.innerHTML += `<p>MVSVGテキスト2: ${data['MVSVGテキスト2']}</p>`;
                    
                    // すべてのキーを表示
                    resultDiv.innerHTML += `<h3>すべてのキー:</h3>`;
                    resultDiv.innerHTML += `<pre>${JSON.stringify(Object.keys(data), null, 2)}</pre>`;
                } else {
                    resultDiv.innerHTML += `<p style="color:red">❌ JSONの読み込みに失敗: ${response.statusText}</p>`;
                }
            } catch (error) {
                resultDiv.innerHTML += `<p style="color:red">❌ エラー: ${error.message}</p>`;
                console.error('詳細エラー:', error);
            }
        }
        
        // ページ読み込み時に実行
        testJsonLoad();
    </script>
</body>
</html>
