<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Table Generation Test</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <h1>Comparison Table Generation Test</h1>
    
    <table>
        <thead>
            <tr id="comparison-header-row"></tr>
        </thead>
        <tbody id="comparison-tbody"></tbody>
    </table>
    
    <div id="debug-output"></div>
    
    <script src="./app.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', async () => {
            const output = document.getElementById('debug-output');
            
            // Initialize the app
            const app = new RankingApp();
            await app.init();
            
            // Wait a bit for initialization
            setTimeout(() => {
                output.innerHTML += '<h2>DataManager Status:</h2>';
                output.innerHTML += `<p>DataManager exists: ${window.dataManager ? 'Yes' : 'No'}</p>`;
                
                if (window.dataManager) {
                    output.innerHTML += `<p>Clinics loaded: ${window.dataManager.clinics.length}</p>`;
                    output.innerHTML += `<p>Clinic texts loaded: ${Object.keys(window.dataManager.clinicTexts).length} entries</p>`;
                    
                    // Test getting ranking for Tokyo (013)
                    const ranking = window.dataManager.getRankingByRegionId('13');
                    output.innerHTML += `<p>Ranking for Tokyo (13): ${ranking ? JSON.stringify(ranking.ranks) : 'Not found'}</p>`;
                    
                    // Test getting clinic data
                    const testText = window.dataManager.getClinicText('omt', '総合評価', 'DEFAULT');
                    output.innerHTML += `<p>Test getClinicText('omt', '総合評価'): ${testText}</p>`;
                    
                    // Show first clinic
                    if (window.dataManager.clinics[0]) {
                        const firstClinic = window.dataManager.clinics[0];
                        output.innerHTML += `<p>First clinic: ${firstClinic.name} (code: ${firstClinic.code})</p>`;
                    }
                    
                    // Show clinic text keys
                    const clinicTextKeys = Object.keys(window.dataManager.clinicTexts);
                    output.innerHTML += `<p>Clinic text keys: ${clinicTextKeys.join(', ')}</p>`;
                }
                
                // Manually trigger comparison table update
                output.innerHTML += '<h2>Triggering table update...</h2>';
                app.updatePageContent('13');
            }, 1000);
        });
    </script>
</body>
</html>
