<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Data Loading Debug</title>
</head>
<body>
    <h1>DataManager Debug Check</h1>
    <div id="output"></div>
    
    <script>
        async function checkDataLoading() {
            const output = document.getElementById('output');
            
            try {
                // Load compiled-data.json
                const compiledResponse = await fetch('./data/compiled-data.json');
                const compiledData = await compiledResponse.json();
                
                output.innerHTML += '<h2>Compiled Data Loaded:</h2>';
                output.innerHTML += `<p>Clinics count: ${compiledData.clinics.length}</p>`;
                output.innerHTML += `<p>First clinic: ${JSON.stringify(compiledData.clinics[0])}</p>`;
                
                // Load clinic-texts.json
                const textsResponse = await fetch('./data/clinic-texts.json');
                const textsData = await textsResponse.json();
                
                output.innerHTML += '<h2>Clinic Texts Loaded:</h2>';
                output.innerHTML += `<p>Clinics in texts: ${Object.keys(textsData).join(', ')}</p>`;
                
                // Check mapping
                output.innerHTML += '<h2>Name-Code Mapping:</h2>';
                compiledData.clinics.forEach(clinic => {
                    const hasText = textsData[clinic.name] ? '✓' : '✗';
                    const clinicCode = textsData[clinic.name]?.クリニックコード || 'N/A';
                    output.innerHTML += `<p>${clinic.id}: ${clinic.name} (code: ${clinic.code}) - Text data: ${hasText}, Code in texts: ${clinicCode}</p>`;
                });
                
                // Check ranking for region 13
                const region13Ranking = compiledData.rankings['13'];
                output.innerHTML += '<h2>Region 13 Ranking:</h2>';
                output.innerHTML += `<p>${JSON.stringify(region13Ranking)}</p>`;
                
                // Check if we can find clinics by ID
                output.innerHTML += '<h2>Finding clinics by ranking IDs:</h2>';
                ['no1', 'no2', 'no3', 'no4', 'no5'].forEach(position => {
                    const clinicId = region13Ranking[position];
                    const clinic = compiledData.clinics.find(c => c.id === String(clinicId));
                    if (clinic) {
                        output.innerHTML += `<p>${position}: ID ${clinicId} = ${clinic.name} (${clinic.code})</p>`;
                    } else {
                        output.innerHTML += `<p>${position}: ID ${clinicId} = NOT FOUND</p>`;
                    }
                });
                
            } catch (error) {
                output.innerHTML += `<p style="color:red">Error: ${error.message}</p>`;
            }
        }
        
        checkDataLoading();
    </script>
</body>
</html>
