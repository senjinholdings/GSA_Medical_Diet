<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=../../redirect.html?clinic_id=1&rank=1">
    <title>Oh my teeth公式サイトへ移動中...</title>
    <script>
        // JavaScriptによるリダイレクト（フォールバック）
        const urlParams = new URLSearchParams(window.location.search);
        const regionId = urlParams.get('region_id') || '013';
        const redirectUrl = `../../redirect.html?clinic_id=1&rank=1&region_id=${regionId}`;
        window.location.href = redirectUrl;
    </script>
</head>
<body>
    <p>Oh my teeth公式サイトへリダイレクト中...</p>
</body>
</html>
