    {
      "@type": "Question",
      "name": "Oh my teethはどのような症例に対応していますか？",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Oh my teethは、軽度から中度の症例に特化した歯科矯正サービスです。軽度の前歯のがたつき、出っ歯、すきっ歯、以前矯正された方の後戻りなどに対応しています。"
      }
    },
{
      "@type": "Question",
      "name": "本当に通わなくてもいいのですか？",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Oh my teethは一度の歯型スキャンにお越しいただければ、ゴールまで設計できるマウスピース矯正です。そのため矯正開始後の定期通院は不要です。"
      }
    },
{
      "@type": "Question",
      "name": "ワイヤー矯正、インビザラインといったほかの矯正サービスとの違いは？",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Oh my teethと一般的な矯正サービスとの違いは「矯正開始後の通院が原則不要」「最短2ヶ月で矯正完了」「矯正完了まで一律料金 」である点です。"
      }
    },
{
      "@type": "Question",
      "name": "一般的にどのくらいの期間がかかりますか？",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Basicプラン(前歯の部分矯正)は平均3ヶ月、Proプラン(奥歯からの全体矯正)は6ヶ月でほとんどの歯並びを改善させています。歯並びのご状況とあなたのご希望を踏まえてどちらのプランが適用になるかを決定します。"
      }
    },
{
      "@type": "Question",
      "name": "マウスピース矯正とはなんですか？",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "マウスピース矯正とは、オーダーメイドのマウスピースを使用した歯科矯正方法です。現状よりほんの少し理想の歯並びに近いマウスピースに定期的に交換することによって、少しずつ歯を理想的な位置に移動させます。"
      }
    },
{
      "@type": "Question",
      "name": "マウスピース矯正のデメリットは何ですか？",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "装着時間の自己管理が大変なことです。計画どおりに歯を動かすために、Oh my teethでは1日のマウスピース装着時間は20時間以上を推奨しています。食事と歯磨きの時以外は基本的にマウスピースをつけなければなりません。"
      }
    }

<body ><div id="__nuxt"><div><span></span><!----><!----></div></div><script type="application/json" id="__NUXT_DATA__" data-ssr="true">[["Reactive",1],{"data":2,"state":4,"_errors":5,"serverRendered":6,"path":7,"pinia":8},{"dynamicDatafaq":3},null,{},{"dynamicDatafaq":3},true,"/faq",{"cmsContentStore":9,"indexStore":69,"projectStore":72,"productStore":94,"pageHeadStore":920},{"listContentsMap":10,"contentMap":11},["Map"],["Map",12,13],"xRq0Mirn/tax20240121",{"cover":14,"knfSIm7l":15,"title":34,"body":35,"slug":36,"bfpvKAaa":37,"_meta":53,"_filter":65,"id":68},"https://storage.googleapis.com/studio-cms-assets/projects/BXaxR2NMO7/s-2400x1350_v-frms_webp_1cec5c59-222c-4dbd-959b-94b8309bbb71.jpg",{"h7JY6AQe":16,"title":17,"slug":18,"_meta":19,"_filter":32,"id":33},"#1d53bb","フィリピン税務・会計","Philippines-tax",{"project":20,"publishedAt":22,"createdAt":23,"order":24,"publishType":25,"schema":26,"uid":30,"updatedAt":31},{"id":21},"qpN8yP4FSFuiOeM94HuL",["Date","2024-08-21T09:57:18.000Z"],["Date","2024-08-21T09:54:47.000Z"],-6,"draft",{"id":27,"key":28,"postType":29},"mFVKiwy2556oA3fqAONB","hp5eVUxy","category","8A6YSmNk",["Date","2024-08-21T09:55:40.000Z"],[],"KP2u9oHIZdaJQQwDmcVq","2024年1月からの税制改正について","\u003Cp data-uid=\"LS9x6SQI\" data-time=\"1708507841063\">2024年1月に施行された改正の中で、特に影響の大きな３つをご紹介します。\u003C/p>\u003Ch3 data-uid=\"D6VtLxb2\" data-time=\"1708507856205\" id=\"index_D6VtLxb2\">\u003Cstrong>1. 税務行政手続きの簡略化に関する法律\u003C/strong>\u003C/h3>\u003Cp data-uid=\"QWQfrzdO\" data-time=\"1708491404053\">フィリピンの税務行政手続きは、日本のものと比較し、複雑であり、実務上、非常に判断に迷うケースが多いです。\u003Cbr>そのため、昨年度より税務行政手続きを簡略化する動きがあり、本年2024年1月5日にEase of Paying Taxes Act（以下、本法） が成立しました。\u003C/p>\u003Cp data-uid=\"1Th2pnp0\" data-time=\"1708491404052\">本法は、2024年1月22日から施行されていますが、より詳細な解釈や見解が本法の施行日から90日以内に詳細の規則が公表される予定となっています。　\u003C/p>\u003Cp data-uid=\"OIfJP5vw\" data-time=\"1708906890458\">今回は、主な改正の内容、現状の法律との違いとその対策について記載いたします。\u003C/p>\u003Cdiv data-type=\"table\" data-uid=\"wrECQtYv\" data-time=\"1708490674278\" data-margin-left=\"auto\" data-margin-right=\"auto\">\u003Ctable style=\"margin-left: auto;margin-right: auto;\">\u003Ctbody>\u003Ctr data-uid=\"MtLVFaXw\" data-time=\"1708490649866\">\u003Cth data-uid=\"ZJwkw57h\" data-time=\"1708490031054\" colspan=\"1\" rowspan=\"1\">\u003Cp data-uid=\"P4mX_GOv\" data-time=\"1708490031054\">\u003Cstrong>税目\u003C/strong>\u003C/p>\u003C/th>\u003Cth data-uid=\"wYQbNitZ\" data-time=\"1708490045015\" colspan=\"1\" rowspan=\"1\">\u003Cp data-uid=\"GzGW7P_C\" data-time=\"1708490045015\">\u003Cstrong>タイトル\u003C/strong>\u003C/p>\u003C/th>\u003Cth data-uid=\"3jYNyV0h\" data-time=\"1708490047527\" colspan=\"1\" rowspan=\"1\">\u003Cp data-uid=\"p_JZXVXW\" data-time=\"1708490047527\">\u003Cstrong>概要\u003C/strong>\u003C/p>\u003C/th>\u003Cth data-uid=\"osJCgvM1\" data-time=\"1708490052118\" colspan=\"1\" rowspan=\"1\">\u003Cp data-uid=\"GvsH3c1S\" data-time=\"1708490052118\">\u003Cstrong>実務対応\u003C/strong>\u003C/p>\u003C/th>\u003C/tr>\u003Ctr data-uid=\"wVF9uMY3\" data-time=\"1708490649866\">\u003Ctd data-uid=\"cO0Yfta5\" data-time=\"1708489449823\" colspan=\"1\" rowspan=\"1\">\u003Cp data-uid=\"5yQQBhlt\" data-time=\"1708489449823\">法人税\u003C/p>\u003C/td>\u003Ctd data-uid=\"1ThBfdY5\" data-time=\"1708489456627\" colspan=\"1\" rowspan=\"1\">\u003Cp data-uid=\"uxlv2rJy\" data-time=\"1708489456627\">損金算入要件の緩和について\u003C/p>\u003C/td>\u003Ctd data-uid=\"z8B2LHHo\" data-time=\"1708489478222\" colspan=\"1\" rowspan=\"1\">\u003Cp data-uid=\"junJg7MF\" data-time=\"1708489478222\">対象となる取引おいて、源泉徴収漏れとなっている費用は、法人税法上、損金算入されないという状況があったが、本法により源泉徴収が損金算入のために必要ではなくなった。\u003C/p>\u003C/td>\u003Ctd data-uid=\"cIzoExQO\" data-time=\"1708489484828\" colspan=\"1\" rowspan=\"1\">\u003Cp data-uid=\"u0m6kQAX\" data-time=\"1708489484828\">対象となる取引おいて、源泉徴収漏れとなっている費用は、法人税法上、損金算入されないという状況があったが、本法により源泉徴収が損金算入のために必要ではなくなった。\u003C/p>\u003C/td>\u003C/tr>\u003Ctr data-uid=\"7_EGGCsA\" data-time=\"1708490649866\">\u003Ctd data-uid=\"PD8UlZ5G\" data-time=\"1708489496867\" colspan=\"1\" rowspan=\"1\">\u003Cp data-uid=\"u7cA51nc\" data-time=\"1708489496867\">源泉所得税\u003C/p>\u003C/td>\u003Ctd data-uid=\"NoimUOCH\" data-time=\"1708489503926\" colspan=\"1\" rowspan=\"1\">\u003Cp data-uid=\"3xsT_mmt\" data-time=\"1708489503926\">源泉徴収義務の発生日の明確化について\u003C/p>\u003C/td>\u003Ctd data-uid=\"89tTYXhC\" data-time=\"1708489510063\" colspan=\"1\" rowspan=\"1\">\u003Cp data-uid=\"q6ay5WNN\" data-time=\"1708489510063\">従来、源泉所得税は「請求基準」「未払基準」「支払基準」の3種類あり、いずれか早い日を納税義務が生じた日としていたが、本法では「未払基準」に統一されることになった。\u003C/p>\u003C/td>\u003Ctd data-uid=\"0_dhEkfF\" data-time=\"1708489516418\" colspan=\"1\" rowspan=\"1\">\u003Cp data-uid=\"cAVZB9GB\" data-time=\"1708489516418\">「未払基準」に統一されたが、原文ではPayable という表現になっているため、支払義務が発生した基準と解釈されるが、詳細の解釈や見解を待つ必要があると解する。\u003C/p>\u003C/td>\u003C/tr>\u003Ctr data-uid=\"Kli0rAMx\" data-time=\"1708490649867\">\u003Ctd data-uid=\"TeN2ef9J\" data-time=\"1708489522701\" colspan=\"1\" rowspan=\"1\">\u003Cp data-uid=\"TyJ4OUWa\" data-time=\"1708489522701\">付加価値税\u003C/p>\u003C/td>\u003Ctd data-uid=\"QzGFQOWM\" data-time=\"1708489550089\" colspan=\"1\" rowspan=\"1\">\u003Cp data-uid=\"0xJkOez3\" data-time=\"1708489550089\">VATの発生時点の統一化について\u003Cbr>[税会不一致から税会一致へ]\u003C/p>\u003C/td>\u003Ctd data-uid=\"ZPS_Fr6r\" data-time=\"1708489560048\" colspan=\"1\" rowspan=\"1\">\u003Cp data-uid=\"D10ffjP5\" data-time=\"1708489560048\">サービス業等においては、VAT の納付は現金主義（現金回収時に発行するOfficial Receiptsがベース）であったが、物品販売業等と同様に発生主義（物品販売時に発行するSalse Invociesがベース）に統一されることになった。\u003C/p>\u003C/td>\u003Ctd data-uid=\"shupvDgF\" data-time=\"1708489681990\" colspan=\"1\" rowspan=\"1\">\u003Cp data-uid=\"m2cs3s48\" data-time=\"1708489681990\">VAT においては、いわゆる税会不一致があるため、その調整が申告時に必要であったが、今後はそこが一致するため、税務申告の計算書類の作成は簡略化される。\u003Cbr>しかし、発生主義でVAT を納税するということは、サービス業等においては、資金回収がされていない状況で仮受VAT を納税することになることから、資金繰りに負担が生じる可能性が高い。\u003C/p>\u003C/td>\u003C/tr>\u003Ctr data-uid=\"XqVe9lG5\" data-time=\"1708490674278\">\u003Ctd data-uid=\"FUv34MbI\" data-time=\"1708489578003\" colspan=\"1\" rowspan=\"1\">\u003Cp data-uid=\"iFVId9pc\" data-time=\"1708489578003\">納税義務者\u003C/p>\u003C/td>\u003Ctd data-uid=\"UmSr90G2\" data-time=\"1708489584807\" colspan=\"1\" rowspan=\"1\">\u003Cp data-uid=\"4e4ItzWI\" data-time=\"1708489584807\">納税者区分の細分化について\u003C/p>\u003C/td>\u003Ctd data-uid=\"YXGz45qy\" data-time=\"1708490674278\" colspan=\"1\" rowspan=\"1\">\u003Cp data-uid=\"rvZrEcGD\" data-time=\"1708490674278\">納税義務者が売上高により細分化され、その納税者区分に応じて、税務上の取り扱いが決定されることになる。\u003Cbr>[別図参照]\u003C/p>\u003C/td>\u003Ctd data-uid=\"lfJiskqq\" data-time=\"1708489599082\" colspan=\"1\" rowspan=\"1\">\u003Cp data-uid=\"X5LaeT9H\" data-time=\"1708489599082\">毎年の財務諸表上の売上高を確認し、どの納税者区分に該当し、どのような影響が各税法にあるかの検討を行う。\u003C/p>\u003C/td>\u003C/tr>\u003Ctr data-uid=\"dBYQsDvE\" data-time=\"1708490649867\">\u003Ctd data-uid=\"VHHj7Ypz\" data-time=\"1708489637375\" colspan=\"1\" rowspan=\"1\">\u003Cp data-uid=\"bGNYUa1M\" data-time=\"1708489637375\">証憑書類\u003C/p>\u003C/td>\u003Ctd data-uid=\"4cWBbaGL\" data-time=\"1708489643931\" colspan=\"1\" rowspan=\"1\">\u003Cp data-uid=\"uDgTH5ne\" data-time=\"1708489643931\">証憑書類の記載要件の緩和について\u003C/p>\u003C/td>\u003Ctd data-uid=\"r9aGKypH\" data-time=\"1708489649552\" colspan=\"1\" rowspan=\"1\">\u003Cp data-uid=\"VqUU87FS\" data-time=\"1708489649552\">フィリピンでは、物品を購入した際の税務上の証憑書類として、Salse Invoice が発行されるが、その記載項目にBusiness Style を記入する欄がある。しかし、本法により、その記載が不要となった。\u003C/p>\u003C/td>\u003Ctd data-uid=\"q7o_yPtR\" data-time=\"1708489689178\" colspan=\"1\" rowspan=\"1\">\u003Cp data-uid=\"KVnwNVKk\" data-time=\"1708489689178\">このBusiness Style には、BIR に登録した名称を記入するのだが、発行担当者が何を記載すればよいかわからず空欄になっていることが散見され、また、通常は会社名とおなじ名称を記載することが多く、二重で記載する意義が不明確であった。\u003Cbr>本法により、税務調査があり、指摘を受けたとしても、抗弁可能と解されるため、実務家としては非常に有利な改正であると解される。\u003C/p>\u003C/td>\u003C/tr>\u003C/tbody>\u003C/table>\u003C/div>\u003Cdiv data-type=\"table\" data-uid=\"s5fVtPHv\" data-time=\"1708507985498\" data-margin-left=\"auto\" data-margin-right=\"auto\">\u003Ctable style=\"margin-left: auto;margin-right: auto;\">\u003Ctbody>\u003Ctr data-uid=\"K4f2eFiH\" data-time=\"1708490821661\">\u003Cth data-uid=\"n06Y2BSy\" data-time=\"1708490821661\" colspan=\"1\" rowspan=\"1\">\u003Cp data-uid=\"FykdnKDK\" data-time=\"1708490821661\">\u003Cstrong>納税者区分\u003C/strong>\u003C/p>\u003C/th>\u003Cth data-uid=\"xn8Rm6ql\" data-time=\"1708490818271\" colspan=\"1\" rowspan=\"1\">\u003Cp data-uid=\"6Qef3WfY\" data-time=\"1708490818271\">\u003Cstrong>定義[売上ベース]\u003C/strong>\u003C/p>\u003C/th>\u003C/tr>\u003Ctr data-uid=\"cDbewTNV\" data-time=\"1708490809541\">\u003Ctd data-uid=\"SDykEP1d\" data-time=\"1708490766112\" colspan=\"1\" rowspan=\"1\">\u003Cp data-uid=\"6TZrnD3b\" data-time=\"1708490766112\">Micro\u003C/p>\u003C/td>\u003Ctd data-uid=\"dkH30xyY\" data-time=\"1708490788789\" colspan=\"1\" rowspan=\"1\">\u003Cp data-uid=\"rjIhiPjO\" data-time=\"1708490788789\">PHP 3M 未満\u003C/p>\u003C/td>\u003C/tr>\u003Ctr data-uid=\"hsPOQjiC\" data-time=\"1708490809541\">\u003Ctd data-uid=\"KcnpTIZZ\" data-time=\"1708490771634\" colspan=\"1\" rowspan=\"1\">\u003Cp data-uid=\"HfPIevUQ\" data-time=\"1708490771634\">Small\u003C/p>\u003C/td>\u003Ctd data-uid=\"GwFBu_tZ\" data-time=\"1708490794437\" colspan=\"1\" rowspan=\"1\">\u003Cp data-uid=\"L9hD7UuV\" data-time=\"1708490794437\">PHP 3M 以上 PHP 20M 未満\u003C/p>\u003C/td>\u003C/tr>\u003Ctr data-uid=\"_RapAbFe\" data-time=\"1708490809541\">\u003Ctd data-uid=\"EUKOQr9g\" data-time=\"1708490776705\" colspan=\"1\" rowspan=\"1\">\u003Cp data-uid=\"jon7s0Nt\" data-time=\"1708490776705\">Medium\u003C/p>\u003C/td>\u003Ctd data-uid=\"rT07qzLu\" data-time=\"1708490799908\" colspan=\"1\" rowspan=\"1\">\u003Cp data-uid=\"8jkHQmt7\" data-time=\"1708490799908\">PHP 20M 以上 1B 未満\u003C/p>\u003C/td>\u003C/tr>\u003Ctr data-uid=\"IzcGHq9X\" data-time=\"1708490809541\">\u003Ctd data-uid=\"wb2qnjq2\" data-time=\"1708490782332\" colspan=\"1\" rowspan=\"1\">\u003Cp data-uid=\"o8O164Jj\" data-time=\"1708490782332\">Large\u003C/p>\u003C/td>\u003Ctd data-uid=\"pz5gPPVM\" data-time=\"1708490805779\" colspan=\"1\" rowspan=\"1\">\u003Cp data-uid=\"JmDSeGIo\" data-time=\"1708490805779\">PHP 1B 以上\u003C/p>\u003C/td>\u003C/tr>\u003C/tbody>\u003C/table>\u003C/div>\u003Cp data-uid=\"Pi9SLS_9\" data-time=\"1708492765098\">・\u003Ca target=\"_blank\" href=\"https://www.officialgazette.gov.ph/downloads/2024/01jan/20240105-RA-11976-FRM.pdf\" data-has-link=\"true\" rel=\"noopener\">EOPT(Ease of Paying Taxes／納税簡易化法) 原文（PDF）\u003C/a>\u003C/p>\u003Cp data-uid=\"lypSErNf\" data-time=\"1708482614679\">\u003C/p>\u003Ch3 data-uid=\"bcQZ4_19\" data-time=\"1708507884462\" id=\"index_bcQZ4_19\">\u003Cstrong>2. PHILHEALTH の負担増額に関する改正\u003C/strong>\u003C/h3>\u003Cp data-uid=\"zfcBQred\" data-time=\"1708491050010\">PHILHEALTH（フィリピン健康保険公社）は、2024年1月から下記の新しい料率で適用しています。\u003Cbr>そのため、拠出率が4％から5%に上昇しています。\u003C/p>\u003Cp data-uid=\"OooPiHfF\" data-time=\"1708492671878\">・\u003Ca target=\"_blank\" href=\"https://www.philhealth.gov.ph/partners/employers/ContributionTable_v2.pdf\" data-has-link=\"true\" rel=\"noopener\">保険料拠出表（PDF）\u003C/a>\u003C/p>\u003Cp data-uid=\"WqOYDBMJ\" data-time=\"1708484081728\">\u003C/p>\u003Ch3 data-uid=\"vZ4x7FbV\" data-time=\"1708507937936\" id=\"index_vZ4x7FbV\">\u003Cstrong>3. Pag - IBIG (HDMF) の負担増額に関する改正\u003C/strong>\u003C/h3>\u003Cp data-uid=\"uwyzy1rh\" data-time=\"1708491008356\">Pag - IBIG (HDMF: 住宅開発相互基金)の労使折半額がそれぞれ1%から2％に改正されました。\u003Cbr>これにより、多くの企業と従業員は、負担額がPHP 100 からPHP 200 となっています。(いわゆる標準月額の上限がPHP 10,000のため、大半が上記金額になります)\u003C/p>\u003Cp data-uid=\"yxZbHfke\" data-time=\"1708507945892\">・\u003Ca target=\"_blank\" href=\"https://www.pagibigfund.gov.ph/document/pdf/circulars/provident/Circular%20No.%20460%20-%20Guidelines%20on%20the%20Pag-IBIG%20Fund's%20Implementation%20of%20Increase%20in%20the%20MFS%20Effective%20February%202024.pdf\" data-has-link=\"true\" rel=\"noopener\">PAG-IBIG 基金の実施に関するガイドライン 有効基金給与（MFS）の最大額の引き上げ（PDF）\u003C/a>\u003C/p>\u003Cp data-uid=\"03Gq0P2K\" data-time=\"1708489162002\">\u003C/p>\u003Cp data-uid=\"cgIplJr1\" data-time=\"1708483081837\">\u003Cbr>\u00
